# LightAI Agent configuration.
# Generated by: lightai-agent config init

[agent]
# Agent local listen address.
listen_addr = "127.0.0.1:18081"

# Node name.  Defaults to hostname if omitted or empty.
# node_name = "gpu-node-01"

# Agent state file path.
state_path = "data/agent-state.toml"

[server]
# LightAI Server URL (HTTPS required for production).
url = "https://127.0.0.1:18443"

# Path to CA certificate for Server TLS verification.
ca_cert_path = "./certs/ca.crt"

# WARNING: Only for temporary diagnostics.  Never use in production.
# insecure_skip_tls_verify = false

# ── GPU / accelerator collector configuration ──
#
# If [gpu_collectors] is NOT configured (root is absent), the Agent will NOT
# execute any GPU collector scripts. The Web node page will show
# "GPU collector not configured" and agent.log will contain a clear diagnostic.
#
# To enable GPU monitoring:
#   1. Place collector files on the agent machine, e.g.
#      /opt/lightai/collectors/gpu/nvidia-wsl/{collector.toml,discover.sh,metrics.sh}
#   2. Run: lightai-agent collector inspect /opt/lightai/collectors/gpu/nvidia-wsl
#   3. Paste the JSON output into Web → collector registry
#   4. Set root, mode, and enabled below
#   5. Start the agent — agent.log will show "GPU collector discovered: id=nvidia ..."
#      and the first heartbeat will log a GPU probe summary.
#
# The framework is fail-closed: if the Server registry has no matching entry
# (id + version), or the script hash does not match, the collector will NOT
# execute and the reason will appear in collector_errors on the Web node page.
#

[gpu_collectors]
root = "./collectors/gpu"
mode = "explicit"         # "explicit" (only enabled list) or "auto" (scan all)
enabled = ["nvidia-wsl"]
# disabled = []
