# HTTP listener (default for initial setup).
# Run scripts/init-server.sh to generate HTTPS certificates and config.
[http]
enabled = true
# Use 0.0.0.0 to accept external connections.
# This is the control-plane port — deploy behind firewall/VPN/HTTPS in production.
listen_addr = "0.0.0.0:18080"

[web]
# Directory containing web frontend static files (web/dist).
# Server serves the Web console at the root path when set.
# Comment out to disable static file serving.
dist_dir = "web/dist"

[database]
# SQLite database path.  Relative paths are resolved against the process CWD.
# With systemd WorkingDirectory=/opt/lightai, this becomes /opt/lightai/data/lightai.db.
url = "sqlite://./data/lightai.db"

[metrics]
# Days of historical metric samples to retain (minimum 1).
retention_days = 7
# How often to run the cleanup task, in hours (minimum 1).
# cleanup_interval_hours = 6

[auth.password]
min_length = 12
complexity_required = false
# 0 disables expiration.
expires_days = 0
force_change_after_reset = true

[auth.session]
ttl_secs = 43200
idle_timeout_secs = 7200
# Set true when serving Web/API over HTTPS.
secure_cookie = true
