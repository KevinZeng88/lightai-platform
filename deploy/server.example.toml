[server]
# Listen address.  Use 0.0.0.0 to accept external connections.
# This is the control-plane port — deploy behind firewall/VPN/HTTPS reverse proxy in production.
listen_addr = "0.0.0.0:10080"

[database]
# SQLite database path.  Relative paths are resolved against the process CWD.
# With systemd WorkingDirectory=/opt/lightai, this becomes /opt/lightai/data/lightai.db.
url = "sqlite://./data/lightai.db"

[metrics]
retention_days = 7

[auth.password]
min_length = 12
complexity_required = false
# 0 disables expiration.
expires_days = 0
force_change_after_reset = true

[auth.session]
ttl_secs = 43200
idle_timeout_secs = 7200
# Set true when serving Web/API over HTTPS.
secure_cookie = false
