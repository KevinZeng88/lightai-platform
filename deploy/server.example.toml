# HTTP listener (required if HTTPS is not configured).
[http]
# Set enabled = false to disable HTTP entirely when using HTTPS only.
enabled = true
# Use 0.0.0.0 to accept external connections.
# This is the control-plane port — deploy behind firewall/VPN/HTTPS in production.
listen_addr = "0.0.0.0:18080"

# HTTPS listener with self-signed certificate.
# Generate certificates first:  lightai-server cert init
# Then uncomment the section below.
# [https]
# listen_addr = "0.0.0.0:18443"
# cert_path = "certs/server.crt"
# key_path = "certs/server.key"

[web]
# Directory containing web frontend static files (web/dist).
# Server serves the Web console at the root path when set.
# Comment out to disable static file serving.
dist_dir = "web/dist"

[database]
# SQLite database path.  Relative paths are resolved against the process CWD.
url = "sqlite://./data/lightai.db"

[metrics]
# Days of historical metric samples to retain (minimum 1).
retention_days = 7
# How often to run the cleanup task, in hours (minimum 1).
# cleanup_interval_hours = 6

[logs]
dir = "logs"
level = "info"
max_file_bytes = 10485760
retention_files = 5
retention_days = 7

[auth.password]
min_length = 12
complexity_required = false
# 0 disables expiration.
expires_days = 0
force_change_after_reset = true

[auth.session]
ttl_secs = 43200
idle_timeout_secs = 7200
# Enable Secure cookie when serving over HTTPS (requires [https] section above).
secure_cookie = false
